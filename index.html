<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoContext Atlas - Knowledge Base Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.95;
    }

    .search-section {
      padding: 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }

    .search-wrapper {
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1em;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      transition: all 0.3s ease;
      background: white;
    }

    .search-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .search-input::placeholder {
      color: #999;
    }

    .filter-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      flex: 1;
      min-width: 200px;
    }

    .filter-group label {
      display: block;
      font-size: 0.9em;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
    }

    .filter-select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      font-size: 0.95em;
      background: white;
      cursor: pointer;
      transition: border-color 0.3s ease;
    }

    .filter-select:focus {
      outline: none;
      border-color: #667eea;
    }

    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
      margin-top: 15px;
    }

    .stat-item {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.95em;
    }

    .stat-label {
      color: #666;
      font-weight: 600;
    }

    .stat-value {
      color: #667eea;
      font-weight: 700;
      font-size: 1.1em;
    }

    .results-section {
      padding: 30px;
    }

    .results-header {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .results-header h2 {
      font-size: 1.3em;
      color: #333;
      margin-bottom: 5px;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .result-item {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 18px;
      border-radius: 6px;
      transition: all 0.3s ease;
      cursor: pointer;
      display: block;
    }

    .result-item:hover {
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      transform: translateX(4px);
      background: #f0f2ff;
    }

    .result-item-inner {
      display: contents;
    }

    .result-title {
      font-size: 1.1em;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 8px;
      word-break: break-word;
      cursor: pointer;
    }

    .result-title a {
      color: #667eea;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .result-title a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .result-path {
      font-size: 0.85em;
      color: #999;
      margin-bottom: 8px;
      font-family: 'Courier New', monospace;
    }

    .result-snippet {
      font-size: 0.95em;
      color: #555;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .highlight {
      background-color: #fff3cd;
      padding: 2px 4px;
      border-radius: 3px;
      font-weight: 600;
      color: #856404;
    }

    .result-meta {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.85em;
    }

    .result-category {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 600;
    }

    .result-matches {
      color: #28a745;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 3em;
      margin-bottom: 15px;
    }

    .empty-state h3 {
      font-size: 1.3em;
      color: #666;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 1em;
      color: #999;
    }

    .footer {
      background: #f8f9fa;
      padding: 20px 30px;
      text-align: center;
      font-size: 0.9em;
      color: #666;
      border-top: 1px solid #e9ecef;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }

      .filter-row {
        flex-direction: column;
      }

      .filter-group {
        min-width: 100%;
      }

      .stats {
        flex-direction: column;
        gap: 10px;
      }

      .result-meta {
        flex-direction: column;
        gap: 8px;
      }
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Markdown Viewer Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      animation: fadeIn 0.3s ease;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.3s ease;
    }

    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1.5em;
    }

    .modal-close {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      width: 40px;
      height: 40px;
      border-radius: 4px;
      transition: background 0.3s ease;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .modal-body {
      overflow-y: auto;
      padding: 30px;
      flex: 1;
    }

    .markdown-content {
      line-height: 1.8;
      color: #333;
    }

    .markdown-content h1 {
      font-size: 2em;
      margin: 30px 0 15px 0;
      color: #667eea;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }

    .markdown-content h2 {
      font-size: 1.5em;
      margin: 25px 0 12px 0;
      color: #764ba2;
    }

    .markdown-content h3 {
      font-size: 1.2em;
      margin: 20px 0 10px 0;
      color: #555;
    }

    .markdown-content p {
      margin: 12px 0;
    }

    .markdown-content ul,
    .markdown-content ol {
      margin: 15px 0 15px 30px;
    }

    .markdown-content li {
      margin: 8px 0;
    }

    .markdown-content code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      color: #d73a49;
    }

    .markdown-content pre {
      background: #f4f4f4;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 15px 0;
      border-left: 4px solid #667eea;
    }

    .markdown-content pre code {
      background: none;
      color: #333;
      padding: 0;
    }

    .markdown-content blockquote {
      margin: 15px 0;
      padding: 10px 15px;
      border-left: 4px solid #667eea;
      background: #f8f9fa;
      color: #666;
    }

    .markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }

    .markdown-content table th,
    .markdown-content table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    .markdown-content table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #667eea;
    }

    .markdown-content table tr:hover {
      background: #f8f9fa;
    }

    .markdown-content a {
      color: #667eea;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .markdown-content a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .modal-info {
      background: #f8f9fa;
      padding: 10px 30px;
      font-size: 0.9em;
      color: #666;
      border-top: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .modal-info-left {
      flex: 1;
    }

    .modal-info-right {
      text-align: right;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .modal-content {
        max-height: 95vh;
      }

      .modal-info {
        flex-direction: column;
        gap: 10px;
        text-align: left;
      }

      .modal-info-right {
        text-align: left;
      }

      .markdown-content h1 {
        font-size: 1.5em;
      }

      .markdown-content h2 {
        font-size: 1.2em;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🔍 NoContext Atlas</h1>
      <p>Centralized Knowledge Base Search</p>
    </div>

    <div class="search-section">
      <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input"
          placeholder="Search by title, content, or keywords... e.g., 'sensor offline', 'nginx setup'"
          autocomplete="off">
      </div>

      <div class="filter-row">
        <div class="filter-group">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter" class="filter-select">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="projectFilter">Project</label>
          <select id="projectFilter" class="filter-select">
            <option value="">All Projects</option>
          </select>
        </div>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">Total Articles:</span>
          <span class="stat-value" id="totalArticles">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Results Found:</span>
          <span class="stat-value" id="resultsCount">0</span>
        </div>
      </div>
    </div>

    <div class="results-section">
      <div id="resultsContainer"></div>
    </div>

    <div class="footer">
      <p>🏢 NoContext IT Operations | Powered by Atlas Search Engine</p>
    </div>
  </div>

  <!-- Markdown Viewer Modal -->
  <div id="markdownModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Loading...</h2>
        <button class="modal-close" onclick="closeMarkdownViewer()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="markdownContent" class="markdown-content"></div>
      </div>
      <div class="modal-info">
        <div class="modal-info-left">
          <span id="modalPath"></span>
        </div>
        <div class="modal-info-right">
          <a id="modalDownload" href="#" target="_blank" style="color: #667eea; text-decoration: none;">📥 View Raw</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * Knowledge Base Search Engine
     * Minimal, lightweight, and fully client-side
     */

    class KBSearch {
      constructor() {
        this.index = [];
        this.filteredIndex = [];
        this.categories = new Set();
        this.projects = new Set();
        this.init();
      }

      async init() {
        try {
          // Detect environment and adjust path
          const isGitHubPages = window.location.href.includes('github.io');
          const indexPath = isGitHubPages ? './index.json' : './index.json';
          console.log('Loading from:', indexPath, '(', isGitHubPages ? 'GitHub Pages' : 'Local', ')');

          const response = await fetch(indexPath);
          if (!response.ok) {
            throw new Error(`Failed to load index: ${response.status}`);
          }
          this.index = await response.json();
          this.buildIndex();
          this.setupEventListeners();
          this.render();
        } catch (error) {
          console.error('Error loading search index:', error);
          this.showError(`Failed to load search index: ${error.message}`);
        }
      }

      buildIndex() {
        // Extract unique categories and projects from file paths
        for (const item of this.index) {
          const parts = item.url.split('/');

          // Extract category (usually the folder before filename)
          if (parts.length > 1) {
            const category = parts[parts.length - 2];
            this.categories.add(category);
          }

          // Extract project (usually the first folder)
          if (parts.length > 1) {
            const project = parts[0];
            this.projects.add(project);
          }
        }

        this.populateFilters();
      }

      populateFilters() {
        const categorySelect = document.getElementById('categoryFilter');
        const projectSelect = document.getElementById('projectFilter');

        // Add categories
        Array.from(this.categories)
          .sort()
          .forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = this.formatName(cat);
            categorySelect.appendChild(option);
          });

        // Add projects
        Array.from(this.projects)
          .sort()
          .forEach(proj => {
            const option = document.createElement('option');
            option.value = proj;
            option.textContent = this.formatName(proj);
            projectSelect.appendChild(option);
          });

        document.getElementById('totalArticles').textContent = this.index.length;
      }

      setupEventListeners() {
        document.getElementById('searchInput').addEventListener('input', () => this.search());
        document.getElementById('categoryFilter').addEventListener('change', () => this.search());
        document.getElementById('projectFilter').addEventListener('change', () => this.search());
      }

      search() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const categoryFilter = document.getElementById('categoryFilter').value;
        const projectFilter = document.getElementById('projectFilter').value;

        this.filteredIndex = this.index.filter(item => {
          // Apply category filter
          if (categoryFilter) {
            const itemCategory = item.url.split('/')[item.url.split('/').length - 2];
            if (itemCategory !== categoryFilter) return false;
          }

          // Apply project filter
          if (projectFilter) {
            const itemProject = item.url.split('/')[0];
            if (itemProject !== projectFilter) return false;
          }

          // Apply search query
          if (!query) return true;

          const titleMatch = item.title.toLowerCase().includes(query);
          const contentMatch = item.content.toLowerCase().includes(query);
          const keywordsMatch = item.keywords.some(kw => kw.includes(query));

          return titleMatch || contentMatch || keywordsMatch;
        });

        // Sort by relevance
        this.filteredIndex.sort((a, b) => this.calculateRelevance(a, query) - this.calculateRelevance(b, query));

        document.getElementById('resultsCount').textContent = this.filteredIndex.length;
        this.render();
      }

      calculateRelevance(item, query) {
        if (!query) return 0;

        let score = 0;
        const queryLower = query.toLowerCase();

        // Title matches are more relevant
        if (item.title.toLowerCase().includes(queryLower)) {
          score += 100;
        }

        // Count keyword matches
        score += item.keywords.filter(kw => kw.includes(queryLower)).length * 10;

        // Count content matches
        const contentMatches = (item.content.toLowerCase().match(new RegExp(queryLower, 'g')) || []).length;
        score += contentMatches;

        return -score; // Negative for descending sort
      }

      highlightText(text, query) {
        if (!query) return text;

        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
      }

      formatName(name) {
        return name
          .replace(/[-_]/g, ' ')
          .split(' ')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1))
          .join(' ');
      }

      getCategory(url) {
        const parts = url.split('/');
        return parts.length > 1 ? parts[parts.length - 2] : 'General';
      }

      getProject(url) {
        const parts = url.split('/');
        return parts.length > 0 ? parts[0] : 'Unknown';
      }

      render() {
        const container = document.getElementById('resultsContainer');
        const query = document.getElementById('searchInput').value.toLowerCase();

        if (this.filteredIndex.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <h3>No Results Found</h3>
              <p>${query ? 'Try different keywords or adjust your filters.' : 'Start typing to search the knowledge base.'}</p>
            </div>
          `;
          return;
        }

        const resultsHTML = `
          <div class="results-header">
            <h2>Search Results</h2>
          </div>
          <div class="results-list">
            ${this.filteredIndex.map(item => this.renderResult(item, query)).join('')}
          </div>
        `;

        container.innerHTML = resultsHTML;
      }

      renderResult(item, query) {
        const category = this.getCategory(item.url);
        const project = this.getProject(item.url);
        const highlightedTitle = this.highlightText(item.title, query);
        const highlightedContent = this.highlightText(item.content, query);
        const matchCount = query
          ? (item.title.toLowerCase().match(new RegExp(query, 'g')) || []).length +
          (item.content.toLowerCase().match(new RegExp(query, 'g')) || []).length
          : 0;

        return `
          <div class="result-item" onclick="openMarkdownViewer('${item.url}', '${item.title.replace(/'/g, "\\'")}'); return false;">
            <div class="result-title">
              ${highlightedTitle}
            </div>
            <div class="result-path">📁 ${item.url}</div>
            <div class="result-snippet">${highlightedContent}...</div>
            <div class="result-meta">
              <span class="result-category">${this.formatName(category)}</span>
              <span style="color: #999;">Project: <strong>${this.formatName(project)}</strong></span>
              ${query && matchCount > 0 ? `<span class="result-matches">✓ ${matchCount} match${matchCount > 1 ? 'es' : ''}</span>` : ''}
            </div>
          </div>
        `;
      }

      showError(message) {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <h3>Error Loading Search</h3>
            <p>${message}</p>
          </div>
        `;
      }
    }

    /**
     * Get repository base URL
     */
    function getRepoBase() {
      const { origin, pathname } = window.location;
      const dir = pathname.substring(0, pathname.lastIndexOf('/') + 1);
      return origin + dir;
    }

    /**
     * Markdown Viewer Functions
     */
    async function openMarkdownViewer(filePath, title) {
      const modal = document.getElementById('markdownModal');
      const contentDiv = document.getElementById('markdownContent');

      if (!modal || !contentDiv) {
        console.error('Modal elements not found');
        return;
      }

      modal.classList.add('active');
      contentDiv.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="spinner"></div></div>';
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalPath').textContent = `📁 ${filePath}`;
      document.getElementById('modalDownload').href = filePath;

      try {
        const fileUrl = `${getRepoBase()}${filePath}`;

        console.log('Environment:', window.location.href.includes('github.io') ? 'GitHub Pages' : 'Local');
        console.log('Repo Base:', getRepoBase());
        console.log('Fetching:', fileUrl);

        const response = await fetch(fileUrl);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: Failed to load file`);
        }

        const markdown = await response.text();
        const html = convertMarkdownToHtml(markdown);
        contentDiv.innerHTML = html;
      } catch (error) {
        console.error('Error loading markdown:', error);
        contentDiv.innerHTML = `<div style="color: red; padding: 20px;">
          <strong>Error loading file:</strong> ${error.message}<br><br>
          <small>Tried to fetch: ${filePath}</small><br>
          <small>Environment: ${window.location.href.includes('github.io') ? 'GitHub Pages' : 'Local'}</small>
        </div>`;
      }
    }

    function closeMarkdownViewer() {
      const modal = document.getElementById('markdownModal');
      if (modal) {
        modal.classList.remove('active');
      }
    }

    /**
     * Simple Markdown to HTML converter
     */
    function convertMarkdownToHtml(markdown) {
      let html = markdown;

      // Remove YAML frontmatter
      html = html.replace(/^---[\s\S]*?---\n/m, '');

      // Escape HTML special characters
      html = html
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Headers
      html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

      // Code blocks
      html = html.replace(/```(.*?)\n([\s\S]*?)```/gm, '<pre><code>$2</code></pre>');

      // Inline code
      html = html.replace(/`([^`]+)`/gm, '<code>$1</code>');

      // Bold
      html = html.replace(/\*\*([^*]+)\*\*/gm, '<strong>$1</strong>');
      html = html.replace(/__([^_]+)__/gm, '<strong>$1</strong>');

      // Italic
      html = html.replace(/\*([^*]+)\*/gm, '<em>$1</em>');
      html = html.replace(/_([^_]+)_/gm, '<em>$1</em>');

      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/gm, '<a href="$2" target="_blank">$1</a>');

      // Blockquotes
      html = html.replace(/^&gt; (.*?)$/gm, '<blockquote>$1</blockquote>');

      // Lists
      html = html.replace(/^\* (.*?)$/gm, '<li>$1</li>');
      html = html.replace(/^- (.*?)$/gm, '<li>$1</li>');
      html = html.replace(/^\d+\. (.*?)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>');

      // Paragraphs
      html = html.replace(/\n\n+/g, '</p><p>');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p><\/p>/g, '');

      return html;
    }

    // Initialize search engine when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      new KBSearch();

      // Setup modal event listeners
      const modal = document.getElementById('markdownModal');
      if (modal) {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            closeMarkdownViewer();
          }
        });
      }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeMarkdownViewer();
      }
    });
  </script>
</body>
