name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.md'
      - 'generate-index.js'
      - 'index.html'
      - 'viewer.html'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🔍 Generate search index
        run: node generate-index.js
        
      - name: ✅ Verify index was generated
        run: |
          if [ -f index.json ]; then
            echo "✓ Index generated successfully"
            wc -l index.json
          else
            echo "✗ Index not found!"
            exit 1
          fi

      - name: 📋 Commit index changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: regenerate search index" && echo "INDEX_UPDATED=true" >> $GITHUB_ENV)

      - name: 📤 Push changes
        if: env.INDEX_UPDATED == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: 📦 Setup Pages
        uses: actions/configure-pages@v4

      - name: 🚀 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Log deployment info
        run: |
          echo "=== Deployment Summary ==="
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Pages URL: ${{ steps.deployment.outputs.page_url }}"
          echo "================================"
